name: CI Build

on:
  push:
    branches:
        - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: "Checkout code"
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
          java-version: '21'
          distribution: 'temurin'

    - name: Build with Gradle
      run: ./gradlew build
